apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: app
type: Opaque
stringData:
  # stringData accepts plain text - K8s handles the base64 encoding internally.
  # In production, you would not hardcode these values here.
  # You would use a tool like Sealed Secrets or External Secrets Operator
  # to inject secrets from a secure store (Vault, AWS Secrets Manager, etc.)
  DB_PASSWORD: "placeholder-db-password"
  API_KEY: "placeholder-api-key"
