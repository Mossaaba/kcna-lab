apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello2
spec:
  replicas: 3
  selector: 
    matchLabels:
      app: hello2
  template:
    metadata:
      labels:
        app: hello2
    spec:
      containers:
      - name: hello2
        image: httpd:2.4.57
        ports:
          - containerPort: 80
        envFrom:
          - configMapRef:
              name: hello-2-config
          - secretRef:
              name: hello-secret-2